spring.application.name=GyanSetu
server.port=8080

# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://localhost:5432/gyan_setu
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

# ================= JPA =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Prevents lazy-loading issues outside transactions
spring.jpa.open-in-view=false

# ================= JWT =================
app.jwt.secret=please_change_me_to_a_long_random_256bit_secret_value
# 365 days — prevents silent logout causing dashboards to look empty
app.jwt.expiration-millis=31536000000

# ================= CORS =================
app.cors.allowed-origins=http://localhost:5173

# ================= GROQ AI =================
groq.api.key=${GROQ_API_KEY:YOUR_GROQ_API_KEY_HERE}